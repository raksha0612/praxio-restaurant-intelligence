# /etc/nginx/sites-available/praxiotech-restaurant
# After DNS: certbot --nginx -d restaurant.praxiotech.de

server {
    listen 80;
    server_name restaurant.praxiotech.de;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name restaurant.praxiotech.de;

    # ssl_certificate     /etc/letsencrypt/live/restaurant.praxiotech.de/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/restaurant.praxiotech.de/privkey.pem;

    location / {
        proxy_pass         http://localhost:8502;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}
