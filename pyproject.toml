[project]
name = "restaurant-intelligence"
version = "1.0.0"
description = "AI-powered restaurant competitive intelligence — Octoparse + Streamlit + Claude"
requires-python = ">=3.11"
dependencies = [
    "streamlit>=1.32",
    "anthropic>=0.40",
    "plotly>=5.18",
    "matplotlib>=3.8",
    "reportlab>=4.1",
    "pandas>=2.1",
    "numpy>=1.26",
    "openpyxl>=3.1",
    "python-dotenv>=1.0.0",
    "python-dateutil>=2.8.2",
    "httpx>=0.27",
]

[dependency-groups]
dev = [
    "pytest>=7.4.0",
    "ruff>=0.4.0",
]

# uv.lock is auto-generated by `uv sync` — never edit it manually
# It locks exact versions for reproducible installs across machines

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I"]
ignore = ["E501"]
